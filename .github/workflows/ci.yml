name: CI
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

jobs:
  test:
    name: Validate data, tests & generated docs
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Cover the floor (requires-python = ">=3.10") and a current release.
        python-version: ["3.10", "3.13"]
    steps:
      - name: Check out code
        # Pinned to the same commit SHA (v4.2.2) the publish workflow uses.
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Set up Python ${{ matrix.python-version }}
        # Pinned to an immutable commit SHA (v5.6.0), matching the publish
        # workflow's SHA-pinning convention. Re-verify and bump when updating:
        #   git ls-remote https://github.com/actions/setup-python refs/tags/v5
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      - name: Validate data integrity
        # The pack has no third-party deps and the engine runs without ComfyUI, so
        # nothing needs installing — the standard library is enough.
        run: python tests/validate_data.py
      - name: Run the test suite
        run: python -m unittest discover -s tests -v
      - name: Check generated reference docs are current
        run: python scripts/generate_reference_docs.py --check
      - name: Check generated frontend data is current
        run: python scripts/generate_js_data.py --check
